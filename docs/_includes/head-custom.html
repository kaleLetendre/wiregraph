<!-- Render ```mermaid fenced code blocks as diagrams on the Pages site.
     (github.com renders them natively; Jekyll needs mermaid.js injected.) -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  // kramdown+Rouge wraps a ```mermaid fence in .language-mermaid — swap each for a
  // <div class="mermaid"> holding the raw diagram source, then let mermaid render.
  document.querySelectorAll('.language-mermaid').forEach((el) => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = el.textContent;
    el.replaceWith(div);
  });
  mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'strict' });
  await mermaid.run();
</script>
